<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeRent (Lit)</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-2: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.10);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.70);
        --danger: #ff4d6d;
        --accent: #7c3aed;
        --accent-2: #22c55e;
        --shadow: 0 18px 50px rgba(0,0,0,0.45);
        --radius: 16px;
        --radius-sm: 12px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
        background:
          radial-gradient(900px 400px at 15% 10%, rgba(124,58,237,0.35), transparent 60%),
          radial-gradient(700px 380px at 90% 15%, rgba(34,197,94,0.20), transparent 60%),
          radial-gradient(900px 520px at 50% 100%, rgba(56,189,248,0.16), transparent 55%),
          var(--bg);
        color: var(--text);
      }
      a { color: inherit; text-decoration: none; }
      .container { width: min(1100px, calc(100% - 32px)); margin: 0 auto; }

      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(10px);
        background: rgba(11,16,32,0.65);
        border-bottom: 1px solid var(--border);
      }
      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
        gap: 18px;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .brand-badge {
        width: 34px; height: 34px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(124,58,237,0.95), rgba(56,189,248,0.80));
        box-shadow: 0 10px 30px rgba(124,58,237,0.25);
        display: grid; place-items: center;
        border: 1px solid rgba(255,255,255,0.22);
      }
      .nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
      .nav-link {
        padding: 8px 10px;
        border-radius: 12px;
        color: var(--muted);
        border: 1px solid transparent;
      }
      .nav-link:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.10); color: var(--text); }
      .nav-user {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.05);
      }
      .avatar {
        width: 28px; height: 28px;
        border-radius: 999px;
        display: grid; place-items: center;
        background: rgba(124,58,237,0.30);
        border: 1px solid rgba(255,255,255,0.15);
        font-weight: 800;
      }
      .btn {
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
      }
      .btn:hover { background: rgba(255,255,255,0.10); }
      .btn-primary {
        border-color: rgba(124,58,237,0.40);
        background: linear-gradient(135deg, rgba(124,58,237,0.92), rgba(56,189,248,0.55));
      }
      .btn-primary:hover { filter: brightness(1.05); }
      .btn-danger { border-color: rgba(255,77,109,0.45); background: rgba(255,77,109,0.12); }
      .btn-danger:hover { background: rgba(255,77,109,0.18); }

      main { padding: 26px 0 52px; }
      .card {
        border-radius: var(--radius);
        border: 1px solid rgba(255,255,255,0.12);
        background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .card-inner { padding: 18px; }
      .hero {
        padding: 22px 18px;
        background:
          radial-gradient(800px 260px at 20% 20%, rgba(124,58,237,0.35), transparent 55%),
          radial-gradient(600px 240px at 80% 30%, rgba(56,189,248,0.22), transparent 60%),
          rgba(255,255,255,0.02);
        border-bottom: 1px solid rgba(255,255,255,0.10);
      }
      .hero-title { margin: 0; font-size: 1.2rem; letter-spacing: 0.2px; }
      .hero-sub { margin: 8px 0 0; color: var(--muted); line-height: 1.45; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
      @media (min-width: 860px) { .grid { grid-template-columns: 1.1fr 0.9fr; } }

      .form {
        display: grid;
        gap: 12px;
      }
      .field { display: grid; gap: 6px; }
      .label { font-size: 0.92rem; color: rgba(255,255,255,0.80); font-weight: 700; }
      .input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(11,16,32,0.35);
        color: var(--text);
        outline: none;
      }
      .input:focus { border-color: rgba(124,58,237,0.55); box-shadow: 0 0 0 4px rgba(124,58,237,0.18); }
      .help { font-size: 0.9rem; color: var(--muted); margin: 0; }
      .error {
        border: 1px solid rgba(255,77,109,0.35);
        background: rgba(255,77,109,0.10);
        padding: 10px 12px;
        border-radius: 12px;
        color: rgba(255,255,255,0.92);
        line-height: 1.35;
      }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

      .footer {
        border-top: 1px solid rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.70);
        padding: 18px 0 26px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
